name: Desktop

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            build: linux
          - name: Windows
            os: windows-latest
            build: windows
          - name: macOS
            os: macos-latest
            build: macos
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build ${{ matrix.build }} --release
